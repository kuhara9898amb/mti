<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お客様情報入力</title>
  <style>
    :root {
      --surface: #f4f7f8;
      --card: #ffffff;
      --text: #273136;
      --muted: #7b8b93;
      --line: #d8e2e5;
      --primary: #0e7c7b;
      --primary-mid: #14a098;
      --accent: #f25c54;
      --green: #6a994e;
      --field: #fbfcfc;
      --shadow: 0 18px 48px rgba(39,49,54,0.10);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 12%, rgba(14,124,123,0.06), transparent 24%),
        radial-gradient(circle at 90% 16%, rgba(106,153,78,0.07), transparent 24%);
    }

    main {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px 14px 34px;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid rgba(216,226,229,0.95);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fade .22s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .footer-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin: 22px 0 0;
      padding: 18px 14px 0;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--primary);
      font-size: 14px;
      font-weight: 850;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .copyright {
      margin: 14px 0 0;
      color: var(--text);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .service-title {
      display: block;
      margin: 0 0 16px;
      color: var(--primary);
      font-size: 24px;
      line-height: 1.22;
      letter-spacing: -0.035em;
      font-weight: 850;
    }

    .header {
      position: relative;
      padding: 30px 22px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .title-group {
      position: relative;
      padding-left: 20px;
    }

    .title-group::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
    }

    .eyebrow {
      display: block;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
    }

    .eyebrow::before {
      content: none;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.18;
      letter-spacing: -0.04em;
      font-weight: 850;
      color: var(--primary);
    }

    .header p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      font-weight: 600;
    }

    .content {
      padding: 22px;
    }

    .form {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    input,
    select {
      width: 100%;
      appearance: none;
      margin-top: 8px;
      padding: 15px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--field);
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: .18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    input:focus,
    select:focus {
      border-color: var(--primary-mid);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(20,160,152,0.12);
    }

    select {
      background-image:
        linear-gradient(45deg, transparent 50%, var(--primary) 50%),
        linear-gradient(135deg, var(--primary) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% + 1px),
        calc(100% - 15px) calc(50% + 1px);
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 600;
    }

    .consent-box {
      margin-top: 2px;
      padding: 15px;
      border-radius: 14px;
      background: #eef6ec;
      border: 1px solid rgba(106,153,78,0.40);
    }

    .checkbox-label {
      position: relative;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--text);
      font-size: 13px;
      line-height: 1.65;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .custom-checkbox {
      position: relative;
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      margin-top: 1px;
      border-radius: 6px;
      border: 2px solid rgba(106,153,78,0.74);
      background: #ffffff;
      transition: .18s ease;
    }

    .custom-checkbox::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 2px;
      width: 6px;
      height: 12px;
      border: solid #ffffff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg) scale(0);
      opacity: 0;
      transition: .16s ease;
    }

    .checkbox-label input:checked + .custom-checkbox {
      border-color: transparent;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(106,153,78,0.14);
    }

    .checkbox-label input:checked + .custom-checkbox::after {
      opacity: 1;
      transform: rotate(45deg) scale(1);
    }

    .policy-link {
      display: inline-flex;
      margin-top: 10px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
    }

    .policy-link:hover {
      text-decoration: underline;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    .buttons.two {
      grid-template-columns: 1fr 1fr;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
      transition: .2s ease;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(242,92,84,0.24);
    }

    .primary:hover {
      transform: translateY(-1px);
      filter: brightness(.98);
      box-shadow: 0 16px 34px rgba(242,92,84,0.30);
    }

    .primary:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .secondary {
      background: #ffffff;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .summary {
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fbfcfc;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .key {
      color: var(--muted);
      font-weight: 850;
    }

    .value {
      color: var(--text);
      line-height: 1.55;
      word-break: break-word;
      font-weight: 650;
    }

    .complete {
      padding: 48px 22px 30px;
      text-align: center;
    }

    .check {
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: var(--green);
      color: #ffffff;
      font-size: 42px;
      font-weight: 900;
      box-shadow: 0 18px 42px rgba(106,153,78,0.24);
    }

    .complete h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.045em;
      line-height: 1.25;
      color: var(--primary);
    }

    .complete p {
      margin: 14px auto 0;
      max-width: 330px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
      font-weight: 600;
    }

    @media (min-width: 720px) {
      main {
        align-items: center;
        padding: 40px 20px;
      }

      .screen {
        max-width: 540px;
        border-radius: 22px;
      }

      .header {
        padding: 38px 34px 26px;
      }

      .header h1 {
        font-size: 28px;
      }

      .service-title {
        margin-left: 0;
      }

      .title-group {
        padding-left: 22px;
      }

      .content {
        padding: 30px 34px 36px;
      }

      .row {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 360px) {
      .footer-links {
        gap: 18px;
      }

      main {
        padding: 10px;
      }

      .screen {
        border-radius: 18px;
      }

      .header,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      .service-title {
        margin-left: 0;
      }

      .title-group {
        padding-left: 18px;
      }

      .summary-row {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .buttons.two {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="screen active" id="inputScreen">
      <div class="header">
        <div class="service-title">生活おまもり24</div>
        <div class="title-group">
          <div class="eyebrow">SECURE FORM</div>
          <h1>お客様情報の入力</h1>
        </div>
        <p>必要事項をご入力のうえ、個人情報の取得に同意して確認画面へお進みください。</p>
      </div>

      <div class="content">
        <form class="form">
          <div class="row">
            <label>
              氏名
              <input type="text" id="nameInput">
            </label>

            <label>
              フリガナ
              <input type="text" id="kanaInput">
            </label>
          </div>

          <div class="row">
            <label>
              生年月日
              <input type="date" id="birthInput">
            </label>

            <label>
              電話番号
              <input type="tel" id="telInput">
            </label>
          </div>

          <label>
            メールアドレス
            <input type="email" id="emailInput">
            
          </label>

          <div class="row">
            <label>
              郵便番号
              <input type="text" id="zipInput">
            </label>

            <label>
              都道府県
              <select id="prefInput">
                <option value="" selected>選択してください</option>
                <option>大阪府</option>
                <option>東京都</option>
                <option>京都府</option>
                <option>兵庫県</option>
                <option>愛知県</option>
                <option>福岡県</option>
              </select>
            </label>
          </div>

          <label>
            住所
            <input type="text" id="addressInput">
          </label>

          <label>
            建物名・部屋番号
            <input type="text" id="buildingInput">
          </label>

          <div class="consent-box">
            <label class="checkbox-label">
              <input type="checkbox" id="privacyConsent">
              <span class="custom-checkbox" aria-hidden="true"></span>
              <span>個人情報の取得・利用目的を確認し、個人情報の取り扱いに同意します。</span>
            </label>
            <a class="policy-link" href="policy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシーを確認する</a>
          </div>

          <div class="buttons">
            <button type="button" class="primary" id="confirmButton" onclick="goConfirm()" disabled>確認画面へ</button>
          </div>
        </form>
      </div>
    </section>

    <section class="screen" id="confirmScreen">
      <div class="header">
        <div class="title-group">
          <div class="eyebrow">CONFIRM</div>
          <h1>入力内容の確認</h1>
        </div>
        <p>内容にお間違いがないかご確認ください。</p>
      </div>

      <div class="content">
        <div class="summary">
          <div class="summary-row"><div class="key">氏名</div><div class="value" id="nameConfirm"></div></div>
          <div class="summary-row"><div class="key">フリガナ</div><div class="value" id="kanaConfirm"></div></div>
          <div class="summary-row"><div class="key">生年月日</div><div class="value" id="birthConfirm"></div></div>
          <div class="summary-row"><div class="key">電話番号</div><div class="value" id="telConfirm"></div></div>
          <div class="summary-row"><div class="key">メール</div><div class="value" id="emailConfirm"></div></div>
          <div class="summary-row"><div class="key">郵便番号</div><div class="value" id="zipConfirm"></div></div>
          <div class="summary-row"><div class="key">都道府県</div><div class="value" id="prefConfirm"></div></div>
          <div class="summary-row"><div class="key">住所</div><div class="value" id="addressConfirm"></div></div>
          <div class="summary-row"><div class="key">建物名</div><div class="value" id="buildingConfirm"></div></div>
          <div class="summary-row"><div class="key">同意</div><div class="value">個人情報の取得・利用に同意済み</div></div>
        </div>

        <div class="buttons two">
          <button type="button" class="secondary" onclick="showScreen('inputScreen')">修正する</button>
          <button type="button" class="primary" onclick="showScreen('completeScreen')">送信する</button>
        </div>
      </div>
    </section>

    <section class="screen" id="completeScreen">
      <div class="complete">
        <div class="check">✓</div>
        <h1>送信が完了しました</h1>
        <p>ご入力いただいた情報を受け付けました。確認メールを送信しましたので、ご確認ください。</p>

        <div class="buttons">
          <button type="button" class="primary" onclick="resetFormAndBack()">入力画面へ戻る</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function formatDate(value) {
      if (!value) return '';
      const parts = value.split('-');
      if (parts.length !== 3) return value;
      return Number(parts[0]) + '年' + Number(parts[1]) + '月' + Number(parts[2]) + '日';
    }

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) {
        element.textContent = value || '';
      }
    }

    function goConfirm() {
      setText('nameConfirm', document.getElementById('nameInput').value);
      setText('kanaConfirm', document.getElementById('kanaInput').value);
      setText('birthConfirm', formatDate(document.getElementById('birthInput').value));
      setText('telConfirm', document.getElementById('telInput').value);
      setText('emailConfirm', document.getElementById('emailInput').value);
      setText('zipConfirm', document.getElementById('zipInput').value);
      setText('prefConfirm', document.getElementById('prefInput').value);
      setText('addressConfirm', document.getElementById('addressInput').value);
      setText('buildingConfirm', document.getElementById('buildingInput').value);

      showScreen('confirmScreen');
    }

    function resetFormAndBack() {
      const inputIds = [
        'nameInput',
        'kanaInput',
        'birthInput',
        'telInput',
        'emailInput',
        'zipInput',
        'addressInput',
        'buildingInput'
      ];

      inputIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) {
          element.value = '';
        }
      });

      const prefInput = document.getElementById('prefInput');
      if (prefInput) {
        prefInput.value = '';
      }

      const privacyConsent = document.getElementById('privacyConsent');
      if (privacyConsent) {
        privacyConsent.checked = false;
      }

      const confirmButton = document.getElementById('confirmButton');
      if (confirmButton) {
        confirmButton.disabled = true;
      }

      const confirmIds = [
        'nameConfirm',
        'kanaConfirm',
        'birthConfirm',
        'telConfirm',
        'emailConfirm',
        'zipConfirm',
        'prefConfirm',
        'addressConfirm',
        'buildingConfirm'
      ];

      confirmIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) {
          element.textContent = '';
        }
      });

      showScreen('inputScreen');
    }

    const privacyConsent = document.getElementById('privacyConsent');
    const confirmButton = document.getElementById('confirmButton');

    if (privacyConsent && confirmButton) {
      privacyConsent.addEventListener('change', () => {
        confirmButton.disabled = !privacyConsent.checked;
      });
    }
  </script>
</body>
</html>
